name: Update WhatsApp Versions

on:
  workflow_dispatch:

jobs:
  update_whatsapp_versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Setup GIT
        run: |
          git config --global user.name "joaosouz4dev"
          git config --global user.email "47183663+joaosouz4dev@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 18.20.8

      - name: Get npm cache directory
        id: npm-cache
        run: |
          echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

      - name: Setup npm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup docusaurus cache
        uses: actions/cache@v5
        with:
          path: ".docusaurus"
          key: ${{ runner.os }}-docusaurus-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-docusaurus-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-docusaurus-

      - name: Setup node_modules cache
        uses: actions/cache@v5
        with:
          path: "node_modules/.cache"
          key: ${{ runner.os }}-node_modules-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-cache-

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Update WhatsApp Versions
        run: npm run wa-version:download

      - name: Build Page
        run: npm run build

      - name: Commit WhatsApp Versions
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: Update Whatsapp Versions"
          git push
